<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Connected</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; max-width: 800px; }
      a, button { padding: 8px 12px; text-decoration: none; }
    </style>
  </head>
  <body>
    <h2>Google account connected</h2>
    <p id="msg">Connection successful.</p>
    <a href="/app/sheets">Continue to Sheets</a>
    <script>
      (async () => {
        const res = await fetch("/auth/me");
        if (!res.ok) {
          window.location.href = "/app/connect";
          return;
        }
        const me = await res.json();
        if (me.email) {
          document.getElementById("msg").textContent = `Connection successful for: ${me.email}`;
        }
      })();
    </script>
  </body>
</html>
