<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connect Google Sheets</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --border: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 45%, #eef2ff 100%);
        font-family: Inter, Arial, sans-serif;
        color: var(--text);
        padding: 20px;
      }
      .card {
        width: min(520px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #1d4ed8;
        background: #eff6ff;
        border: 1px solid #dbeafe;
        border-radius: 999px;
        padding: 6px 12px;
      }
      h1 {
        margin: 14px 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.45;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: .7;
        cursor: not-allowed;
      }
      .primary {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .primary:hover { background: var(--primary-hover); }
      .secondary {
        background: #fff;
        color: #111827;
      }
      #logoutBtn { display: none; }
      .google-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: conic-gradient(#ea4335 0deg 90deg, #fbbc05 90deg 180deg, #34a853 180deg 270deg, #4285f4 270deg 360deg);
        border: 1px solid rgba(255, 255, 255, 0.35);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="badge">Google Sheets Setup</span>
      <h1>Connect your Google account</h1>
      <p>
        Sign in once to connect your sheet and continue to the dashboard.
      </p>
      <div class="actions">
        <button id="connectBtn" class="primary">
          <span class="google-dot" aria-hidden="true"></span>
          Continue with Google
        </button>
        <button id="logoutBtn" class="secondary">Logout</button>
      </div>
    </div>
    <script>
      const connectBtn = document.getElementById("connectBtn");
      const logoutBtn = document.getElementById("logoutBtn");

      async function withButtonLoading(button, loadingText, action) {
        const originalText = button.textContent;
        const wasDisabled = button.disabled;
        button.disabled = true;
        button.textContent = loadingText;
        try {
          return await action();
        } finally {
          button.textContent = originalText;
          button.disabled = wasDisabled;
        }
      }

      async function ensureSession() {
        try {
          const res = await fetch("/auth/me");
          if (res.ok) {
            logoutBtn.style.display = "inline-flex";
          }
          if (res.ok) {
            // Keep revisit flow seamless.
            window.location.href = "/app/sheets";
          }
        } catch {
          logoutBtn.style.display = "none";
        }
      }

      connectBtn.onclick = async () => withButtonLoading(connectBtn, "Connecting...", async () => {
        const res = await fetch("/integrations/google/connect");
        if (!res.ok) return;
        const data = await res.json();
        if (data.authorization_url) {
          window.location.href = data.authorization_url;
        } else {
          window.location.href = "/app/sheets";
        }
      });

      logoutBtn.onclick = async () => withButtonLoading(logoutBtn, "Logging out...", async () => {
        await fetch("/auth/logout", { method: "POST" });
        window.location.href = "/app/connect";
      });
      ensureSession();
    </script>
  </body>
</html>
