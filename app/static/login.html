<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; margin: 24px; background: #f7f8fb; color: #1f2937; }
      .card { max-width: 420px; margin: 40px auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
      input { padding: 8px; width: 100%; margin-top: 6px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
      button { padding: 8px 12px; border: 1px solid #2563eb; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer; width: 100%; }
      .link { margin-top: 12px; font-size: 14px; }
      .error { color: #b91c1c; margin-top: 10px; min-height: 18px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Login</h2>
      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input id="password" type="password" placeholder="********" />
      <button id="loginBtn">Login</button>
      <div id="error" class="error"></div>
      <div class="link">New user? <a href="/app/register">Create account</a></div>
    </div>
    <script>
      const existing = localStorage.getItem("auth_token");
      if (existing) window.location.href = "/app/connect";

      document.getElementById("loginBtn").onclick = async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const error = document.getElementById("error");
        error.textContent = "";
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          error.textContent = data.detail || "Login failed.";
          return;
        }
        localStorage.setItem("auth_token", data.access_token);
        localStorage.setItem("auth_email", data.email);
        localStorage.setItem("auth_user_id", data.user_id);
        window.location.href = "/app/connect";
      };
    </script>
  </body>
</html>
