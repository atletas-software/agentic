<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Sheets Dashboard</title>
    <style>
      :root {
        --bg: #eef2ff;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --text: #1f2937;
        --muted: #64748b;
        --primary: #2563eb;
        --primary-strong: #1d4ed8;
        --border: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        background: radial-gradient(circle at top left, #dbeafe 0%, var(--bg) 45%, #f1f5f9 100%);
        color: var(--text);
        min-height: 100vh;
      }
      .container { max-width: 1080px; margin: 0 auto; padding: 24px; }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      h2 { margin: 0; font-size: 32px; line-height: 1.2; }
      .subtle { color: var(--muted); font-size: 14px; margin-top: 6px; }
      .nav a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        background: #eff6ff;
        border: 1px solid #dbeafe;
        padding: 8px 12px;
        border-radius: 10px;
      }
      .nav button {
        color: #111827;
        text-decoration: none;
        font-weight: 600;
        background: #fff;
        border: 1px solid #d1d5db;
        padding: 8px 12px;
        border-radius: 10px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 22px;
        margin-bottom: 18px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      .section-title { margin: 0 0 14px; font-size: 24px; }
      .label { font-size: 13px; color: var(--muted); margin: 8px 0 6px; display: inline-block; }
      button {
        padding: 10px 14px;
        cursor: pointer;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        background: #fff;
        font-weight: 600;
        transition: all .12s ease;
      }
      button:hover:not(:disabled) { border-color: #94a3b8; }
      button.primary {
        background: linear-gradient(180deg, var(--primary), var(--primary-strong));
        color: #fff;
        border-color: var(--primary);
      }
      button:disabled {
        opacity: .7;
        cursor: not-allowed;
      }
      input, select {
        padding: 10px 12px;
        width: 100%;
        margin-top: 6px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        box-sizing: border-box;
        background: #fff;
      }
      .selected-item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        background: var(--surface-soft);
        margin-top: 8px;
      }
      .selected-name { font-weight: 700; margin-bottom: 4px; }
      .selected-id { color: var(--muted); font-size: 13px; word-break: break-all; }
      .selected-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        font-size: 13px;
        font-weight: 600;
        color: var(--primary);
        text-decoration: none;
      }
      .selected-link:hover { text-decoration: underline; }
      .actions-row { margin: 14px 0 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      .sync-status { font-size: 13px; color: var(--muted); margin-left: 2px; }
      .sync-indicator {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #475569;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 999px;
        padding: 6px 10px;
      }
      .sync-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ef4444;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18);
      }
      .sync-dot.enabled {
        background: #10b981;
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
      }
      .sync-warning {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #fdba74;
        background: #fff7ed;
        color: #9a3412;
        font-size: 13px;
        line-height: 1.4;
        display: none;
      }
      .sync-warning strong { color: #7c2d12; }
      .modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.45); display: none; align-items: center; justify-content: center; z-index: 9999; }
      .modal { width: min(520px, 92vw); background: #fff; border-radius: 14px; border: 1px solid var(--border); box-shadow: 0 22px 48px rgba(0,0,0,.2); padding: 16px; }
      .modal h4 { margin: 0 0 8px; }
      .modal p { margin: 0 0 14px; color: #334155; line-height: 1.45; }
      .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
      .toast-stack {
        position: fixed;
        top: 18px;
        right: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10000;
      }
      .toast {
        min-width: 260px;
        max-width: 380px;
        background: #0f172a;
        color: #fff;
        border-radius: 10px;
        padding: 12px 14px;
        box-shadow: 0 12px 24px rgba(2, 6, 23, 0.25);
        font-size: 14px;
        line-height: 1.4;
        border-left: 4px solid #2563eb;
      }
      .toast.error { border-left-color: #ef4444; }
      .toast.success { border-left-color: #10b981; }
      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
        .topbar { flex-direction: column; align-items: flex-start; gap: 10px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div>
          <h2>Google Sheets Dashboard</h2>
          <div class="subtle">Select one sheet and keep it synced automatically.</div>
        </div>
        <div class="nav">
          <a href="/app/settings" title="Sync Settings">Settings</a>
          <button id="logoutBtn" title="Logout">Logout</button>
        </div>
      </div>

      <div class="card">
        <span class="label">Logged in user</span>
        <input id="userId" value="" readonly />
        <div class="actions-row">
          <button id="syncToggleBtn" class="primary">Enable Sync</button>
          <span class="sync-indicator">
            <span id="syncDot" class="sync-dot" aria-hidden="true"></span>
            <span id="syncToggleStatus" class="sync-status"></span>
          </span>
        </div>
        <div id="syncWarning" class="sync-warning">
          <strong>Sync is disabled.</strong> Data will not sync while disabled. Please enable sync to continue syncing data.
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h3 class="section-title">Available Google Sheets</h3>
          <div class="actions-row">
            <button id="loadSheetsBtn">Load Sheets</button>
          </div>
          <span class="label">Sheets</span>
          <select id="sheetSelect"></select>
          <span class="label" style="margin-top:10px;">Tabs in selected sheet</span>
          <select id="tabSelect"></select>
          <div class="actions-row">
            <button id="selectSheetBtn" class="primary">Select Sheet</button>
          </div>
        </div>

        <div class="card">
          <h3 class="section-title">Selected Sheet</h3>
          <div id="selectedSheetBox" class="selected-item">No sheet selected.</div>
        </div>
      </div>
    </div>

    <div id="modalBackdrop" class="modal-backdrop">
      <div class="modal">
        <h4 id="modalTitle">Confirm</h4>
        <p id="modalMessage"></p>
        <div class="modal-actions">
          <button id="modalCancelBtn">Cancel</button>
          <button id="modalConfirmBtn" class="primary">Confirm</button>
        </div>
      </div>
    </div>
    <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

    <script>
      const userIdEl = document.getElementById("userId");
      const sheetSelect = document.getElementById("sheetSelect");
      const tabSelect = document.getElementById("tabSelect");
      const selectedSheetBox = document.getElementById("selectedSheetBox");
      const modalBackdrop = document.getElementById("modalBackdrop");
      const modalTitle = document.getElementById("modalTitle");
      const modalMessage = document.getElementById("modalMessage");
      const modalCancelBtn = document.getElementById("modalCancelBtn");
      const modalConfirmBtn = document.getElementById("modalConfirmBtn");
      const syncToggleBtn = document.getElementById("syncToggleBtn");
      const syncToggleStatus = document.getElementById("syncToggleStatus");
      const syncDot = document.getElementById("syncDot");
      const syncWarning = document.getElementById("syncWarning");
      const loadSheetsBtn = document.getElementById("loadSheetsBtn");
      const selectSheetBtn = document.getElementById("selectSheetBtn");
      const toastStack = document.getElementById("toastStack");
      const logoutBtn = document.getElementById("logoutBtn");

      function headers() {
        return { "Content-Type": "application/json" };
      }

      function showToast(message, type = "error") {
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.textContent = message;
        toastStack.appendChild(toast);
        setTimeout(() => {
          toast.remove();
        }, 3400);
      }

      async function withButtonLoading(button, loadingText, action) {
        const originalText = button.textContent;
        const wasDisabled = button.disabled;
        button.disabled = true;
        button.textContent = loadingText;
        try {
          return await action();
        } finally {
          button.textContent = originalText;
          button.disabled = wasDisabled;
        }
      }

      function showModal({ title, message, confirmText = "Confirm", cancelText = "Cancel", hideCancel = false }) {
        return new Promise((resolve) => {
          modalTitle.textContent = title;
          modalMessage.textContent = message;
          modalConfirmBtn.textContent = confirmText;
          modalCancelBtn.textContent = cancelText;
          modalCancelBtn.style.display = hideCancel ? "none" : "inline-block";
          modalBackdrop.style.display = "flex";
          const close = (result) => {
            modalBackdrop.style.display = "none";
            modalConfirmBtn.onclick = null;
            modalCancelBtn.onclick = null;
            resolve(result);
          };
          modalConfirmBtn.onclick = () => close(true);
          modalCancelBtn.onclick = () => close(false);
        });
      }

      async function ensureSheetInDropdownAndSelect(spreadsheetId, spreadsheetName) {
        let existing = Array.from(sheetSelect.options).find((o) => o.value === spreadsheetId);
        if (!existing) {
          existing = document.createElement("option");
          existing.value = spreadsheetId;
          existing.textContent = spreadsheetName;
          existing.dataset.name = spreadsheetName;
          sheetSelect.appendChild(existing);
        }
        sheetSelect.value = spreadsheetId;
      }

      async function refreshSyncToggle() {
        const res = await fetch("/integrations/google/sync-settings", { headers: headers() });
        if (!res.ok) {
          showToast("Unable to load sync settings. Please refresh and try again.");
          return;
        }
        const data = await res.json();
        const enabled = Boolean(data?.settings?.sync_enabled);
        syncToggleBtn.textContent = enabled ? "Disable Sync" : "Enable Sync";
        syncToggleBtn.className = enabled ? "" : "primary";
        syncToggleStatus.textContent = enabled ? "Sync enabled" : "Sync disabled";
        syncDot.className = enabled ? "sync-dot enabled" : "sync-dot";
        syncWarning.style.display = enabled ? "none" : "block";
      }

      async function loadSelectedSheet() {
        const res = await fetch("/integrations/google/selected-sheet", { headers: headers() });
        if (!res.ok) {
          showToast("Unable to load selected sheet. Please try again.");
          return;
        }
        const data = await res.json();
        const selected = data.selected_sheet;
        if (!selected) {
          selectedSheetBox.textContent = "No sheet selected.";
          return;
        }
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${encodeURIComponent(selected.spreadsheet_id)}`;
        selectedSheetBox.innerHTML = `
          <div class="selected-name">${selected.spreadsheet_name}</div>
          <div class="selected-id">${selected.spreadsheet_id}</div>
          <a class="selected-link" href="${sheetUrl}" target="_blank" rel="noopener noreferrer">
            Open Google Sheet
          </a>
        `;
        await ensureSheetInDropdownAndSelect(selected.spreadsheet_id, selected.spreadsheet_name);
      }

      async function loadTabsForSelectedSheet() {
        const opt = sheetSelect.options[sheetSelect.selectedIndex];
        if (!opt) {
          tabSelect.innerHTML = "";
          return;
        }
        const res = await fetch(`/integrations/google/sheets/${opt.value}/tabs`, { headers: headers() });
        if (!res.ok) {
          showToast("Could not load tabs for this sheet.");
          return;
        }
        const data = await res.json();
        tabSelect.innerHTML = "";
        (data.tabs || []).forEach((tab) => {
          const t = document.createElement("option");
          t.value = tab;
          t.textContent = tab;
          tabSelect.appendChild(t);
        });
      }

      loadSheetsBtn.onclick = async () => withButtonLoading(loadSheetsBtn, "Loading...", async () => {
        const res = await fetch("/integrations/google/sheets", { headers: headers() });
        if (!res.ok) {
          showToast("Unable to load your Google Sheets. Please try again.");
          return;
        }
        const data = await res.json();
        sheetSelect.innerHTML = "";
        (data.files || []).forEach((f) => {
          const opt = document.createElement("option");
          opt.value = f.id;
          opt.textContent = f.name;
          opt.dataset.name = f.name;
          sheetSelect.appendChild(opt);
        });
        await loadSelectedSheet();
        await loadTabsForSelectedSheet();
      });

      selectSheetBtn.onclick = async () => {
        const opt = sheetSelect.options[sheetSelect.selectedIndex];
        if (!opt) return;
        const ok = await showModal({
          title: "Confirm Selected Sheet",
          message: `Are you sure you want to select "${opt.dataset.name || opt.textContent}"? Make sure you are selecting the right sheet.`,
          confirmText: "Yes, Select Sheet",
          cancelText: "Cancel"
        });
        if (!ok) return;
        await withButtonLoading(selectSheetBtn, "Selecting...", async () => {
          const payload = { spreadsheet_id: opt.value, spreadsheet_name: opt.dataset.name || opt.textContent };
          const res = await fetch("/integrations/google/selected-sheet", {
            method: "POST",
            headers: headers(),
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) {
            showToast(data.detail || "Unable to select this sheet. Please try again.");
            return;
          }
          await loadSelectedSheet();
          await loadTabsForSelectedSheet();
          showToast("Sheet selected successfully.", "success");
        });
      };

      syncToggleBtn.onclick = async () => {
        const currentEnabled = syncToggleBtn.textContent === "Disable Sync";
        await withButtonLoading(syncToggleBtn, "Updating...", async () => {
        const res = await fetch("/integrations/google/sync-settings", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({ sync_enabled: !currentEnabled }),
        });
        const data = await res.json();
        if (!res.ok) {
          showToast(data.detail || "Unable to update sync settings right now.");
          return;
        }
        await refreshSyncToggle();
        showToast(currentEnabled ? "Sync disabled." : "Sync enabled.", "success");
        });
      };

      sheetSelect.onchange = loadTabsForSelectedSheet;
      logoutBtn.onclick = async () => withButtonLoading(logoutBtn, "Logging out...", async () => {
        await fetch("/auth/logout", { method: "POST" });
        window.location.href = "/app/connect";
      });

      (async () => {
        try {
          const meRes = await fetch("/auth/me");
          if (!meRes.ok) {
            window.location.href = "/app/connect";
            return;
          }
          const me = await meRes.json();
          userIdEl.value = me.email || me.user_id || "Authenticated user";
          await refreshSyncToggle();
          await loadSelectedSheet();
          await loadSheetsBtn.onclick();
        } catch {
          showToast("Something went wrong while loading the dashboard.");
        }
      })();
    </script>
  </body>
</html>
